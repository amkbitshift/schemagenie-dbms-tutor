<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchemaGenie - AI SQL Companion & DBMS Tutor</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --border: #334155;
            --code-bg: #0b0f19;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .container {
            background: var(--container-bg);
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 750px;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
            color: var(--text-main);
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .header h1 span {
            color: var(--accent);
        }

        .header p {
            margin: 0.5rem 0 0 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 16px;
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 1.25rem;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:disabled {
            background-color: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        #output {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            min-height: 80px;
            line-height: 1.7;
            color: #e2e8f0;
        }

        .hidden {
            display: none;
        }

        /* Markdown Elements Styling */
        #output p:first-child { margin-top: 0; }
        #output p:last-child { margin-bottom: 0; }
        
        #output pre {
            background-color: #011627;
            border: 1px solid var(--border);
            padding: 1.25rem;
            border-radius: 6px;
            overflow-x: auto;
            margin: 1rem 0;
        }

        #output code {
            background-color: rgba(56, 189, 248, 0.15);
            color: var(--accent);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
        }

        #output pre code {
            background-color: transparent;
            padding: 0;
            color: #fff;
            display: block;
        }

        #output table {
            border-collapse: collapse;
            width: 100%;
            margin: 1.5rem 0;
            font-size: 0.95rem;
        }

        #output th, #output td {
            border: 1px solid var(--border);
            padding: 10px;
            text-align: left;
        }

        #output th {
            background-color: var(--container-bg);
            color: var(--accent);
        }

        #output ul, #output ol {
            padding-left: 1.5rem;
        }

        .loading-text {
            color: var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Schema<span>Genie</span></h1>
            <p>AI SQL Companion & DBMS Architecture Tutor</p>
        </div>
        
        <textarea id="promptInput" placeholder="Ask for an SQL query, schema generation logic, or explain DBMS concepts (e.g., 'Explain 3NF with an example table' or 'Write a query to find secondary highest salary using joins')..."></textarea>
        
        <button id="generateBtn">Analyze & Generate</button>
        
        <div id="output" class="hidden"></div>
    </div>

    <script>
        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');
        const outputDiv = document.getElementById('output');

        generateBtn.addEventListener('click', async () => {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            // Adjust interface for request transmission
            generateBtn.disabled = true;
            generateBtn.textContent = 'Processing Schema...';
            outputDiv.classList.remove('hidden');
            outputDiv.innerHTML = '<p class="loading-text"><em>Genie is analyzing the database request...</em></p>';

            try {
                const response = await fetch('http://127.0.0.1:8000/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ prompt })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.detail || `Server status: ${response.status}`);
                }

                const data = await response.json();
                
                // Process markdown string from backend into clean DOM elements
                outputDiv.innerHTML = marked.parse(data.response);
                
            } catch (error) {
                outputDiv.innerHTML = `<p style="color: #ef4444; font-weight: bold;">Error encountered: ${error.message}</p>`;
            } finally {
                // Restore button functionality
                generateBtn.disabled = false;
                generateBtn.textContent = 'Analyze & Generate';
            }
        });
    </script>
</body>
</html>
